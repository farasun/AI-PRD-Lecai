<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CC-12 社团活动管理 - v1.3.1 Ground Truth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen flex justify-center p-12 overflow-x-auto no-scrollbar">

    <div id="artboard" class="flex flex-row items-start gap-24">

        <!-- ============================================================
             区域 A：主视图 (Left Column - Main View)
             [v1.3.1 Ground Truth: Management Command Center]
             ============================================================ -->
        <div class="flex flex-col">
            <h2 class="text-xl font-bold text-gray-900 mb-4">CC-12 社团活动管理 (状态 I：正常态)</h2>
            <div
                class="w-[375px] h-[812px] bg-white shadow-2xl border border-gray-200 relative p-0 overflow-hidden flex flex-col">

                <!-- Navbar (h-16) -->
                <div class="h-16 flex items-center px-4 border-b border-gray-100 sticky top-0 bg-white z-20">
                    <div class="flex-1"><i class="ri-arrow-left-s-line text-2xl text-gray-900"></i></div>
                    <div class="text-lg font-bold text-gray-900">社团活动管理</div>
                    <div class="flex-1 text-right"></div>
                </div>

                <!-- Scrollable Content -->
                <div class="flex-1 overflow-y-auto pb-32 no-scrollbar">

                    <!-- 模块 1: 置顶区 (管理入口) -->
                    <div class="pt-6 px-4">
                        <div class="flex justify-between items-end mb-4 px-2">
                            <div class="text-lg font-bold text-gray-900">置顶区 (最多3个)</div>
                            <div class="text-sm text-gray-400">调整顺序</div>
                        </div>
                        <div class="flex flex-col gap-4">
                            <div class="p-4 rounded-3xl border border-gray-100 flex items-center gap-4 bg-white shadow-sm">
                                <div class="w-16 h-16 bg-gray-50 rounded-2xl flex items-center justify-center text-gray-300 font-bold uppercase text-[10px]">Cover</div>
                                <div class="flex-1">
                                    <div class="flex items-center gap-2 mb-1">
                                        <div class="text-base font-bold text-gray-900">金秋摄影大赛</div>
                                        <span class="px-2 py-0.5 border border-gray-200 text-gray-400 text-[10px] rounded-lg">指定成员</span>
                                    </div>
                                    <div class="text-xs text-gray-400">摄影 · 官方赛事</div>
                                </div>
                                <i class="ri-more-fill text-xl text-gray-400"></i>
                            </div>
                        </div>
                    </div>

                    <!-- 模块 2: 普通区 -->
                    <div class="pt-8 px-4">
                        <div class="flex justify-between items-end mb-4 px-2">
                            <div class="text-lg font-bold text-gray-900">普通区 (最多20个)</div>
                            <div class="text-sm text-gray-400">调整顺序</div>
                        </div>
                        <div class="flex flex-col gap-4 opacity-60">
                            <div class="p-4 rounded-3xl border border-gray-50 flex items-center gap-4">
                                <div class="w-16 h-16 bg-gray-50 rounded-2xl flex items-center justify-center text-gray-300 font-bold uppercase text-[10px]">Cover</div>
                                <div class="flex-1">
                                    <div class="flex items-center gap-2 mb-1">
                                        <div class="text-base font-bold text-gray-400">周末书法笔会</div>
                                        <span class="px-2 py-0.5 border border-gray-100 text-gray-400 text-[10px] rounded-lg">全部成员</span>
                                    </div>
                                    <div class="text-xs text-gray-400">书画 · 日常活动</div>
                                </div>
                                <i class="ri-more-fill text-xl text-gray-300"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Bottom CTA -->
                <div class="absolute bottom-0 left-0 right-0 p-6 bg-white/80 backdrop-blur-md border-t border-gray-50">
                    <div class="h-14 rounded-2xl bg-gray-900 text-white flex items-center justify-center text-lg font-bold shadow-2xl">
                        新建活动
                    </div>
                </div>
            </div>
        </div>

        <!-- ============================================================
             区域 B：组件变体集 (Right Column - Component Variants)
             ============================================================ -->
        <div class="flex flex-col gap-10 w-[360px]">
            <h2 class="text-xl font-bold text-gray-900">多状态展示</h2>

            <!-- v1.3.1 Management Action Sheet -->
            <div class="flex flex-col">
                <h3 class="text-lg font-bold text-gray-700 mb-4 pl-3 border-l-4 border-gray-900">状态 II：管理配置浮层 (Action Sheet)</h3>
                <div class="bg-white p-6 border border-gray-200 shadow-md rounded-none">
                     <div class="border border-gray-100 rounded-3xl overflow-hidden bg-gray-900/10">
                        <div class="flex flex-col mt-32 bg-white border-t border-gray-200 rounded-t-3xl p-6 space-y-4 shadow-[0_-8px_30px_rgb(0,0,0,0.12)]">
                            <div class="flex flex-col mb-2">
                                <span class="text-lg font-bold text-gray-900 leading-none">活动管理</span>
                                <span class="text-sm text-gray-400 mt-2">金秋摄影大赛</span>
                            </div>
                            
                            <!-- Core Action: Visibility Setting -->
                            <div class="p-4 bg-gray-900 text-white rounded-2xl flex items-center gap-4 shadow-xl">
                                <div class="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center"><i class="ri-shield-user-line text-xl text-white"></i></div>
                                <div class="flex-1">
                                    <div class="text-base font-bold text-white">谁可以看本活动</div>
                                    <div class="text-xs text-gray-300">当前：指定成员</div>
                                </div>
                                <i class="ri-arrow-right-s-line text-white/40 text-2xl"></i>
                            </div>

                            <!-- Legacy Action: Survey -->
                            <div class="p-4 bg-gray-50 border border-gray-100 rounded-2xl flex items-center gap-4 opacity-50">
                                <div class="w-10 h-10 bg-gray-200 rounded-xl flex items-center justify-center"><i class="ri-survey-line text-xl text-gray-400"></i></div>
                                <div class="flex-1 text-base font-bold text-gray-400">修改关联问卷</div>
                                <i class="ri-arrow-right-s-line text-gray-200 text-xl"></i>
                            </div>

                            <div class="pt-4 pb-2 text-center border-t border-gray-50">
                                <span class="text-lg font-bold text-gray-400">取消</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>


    </div>
</body>
</html>
