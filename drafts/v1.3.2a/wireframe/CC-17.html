<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CC-17 作品审核-待审核 - 低保真线框图</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        body { background-color: #e5e7eb; }
    </style>
</head>
<body class="min-h-screen flex justify-center p-12 overflow-x-auto">

    <div id="artboard" class="flex flex-row items-start gap-24">
        
        <!-- Area A: Main View (Tournament Items Prioritized) -->
        <div class="flex flex-col">
            <div class="text-xl font-bold text-gray-900 mb-4">CC-17 作品审核 (状态 I：待审核)</div>
            <div class="w-[375px] bg-white shadow-2xl border border-gray-200 relative p-0 overflow-hidden flex flex-col">
                
                <!-- Navbar -->
                <div class="h-16 flex items-center px-4 border-b border-gray-100 z-50 bg-white">
                    <i class="ri-arrow-left-s-line text-2xl"></i>
                    <div class="flex-1 text-center font-bold text-gray-900">投稿审核</div>
                    <i class="ri-list-check-line text-2xl"></i>
                </div>

                <!-- Tabs -->
                <div class="flex border-b border-gray-50 sticky top-16 bg-white z-40">
                    <div class="flex-1 flex flex-col items-center py-4 relative">
                        <span class="text-base font-bold text-gray-900">待审核</span>
                        <div class="absolute bottom-0 w-8 h-1 bg-gray-900 rounded-full"></div>
                    </div>
                    <div class="flex-1 flex flex-col items-center py-4">
                        <span class="text-base text-gray-400">已通过</span>
                    </div>
                    <div class="flex-1 flex flex-col items-center py-4">
                        <span class="text-base text-gray-400">已驳回</span>
                    </div>
                </div>

                <!-- List Content -->
                <div class="flex-1 h-auto pb-24 overflow-y-auto">
                    
                    <!-- Tournament Review Item 1 (PRIORITIZED) -->
                    <div class="p-6 border-b border-gray-50">
                        <div class="flex gap-4 mb-4">
                            <!-- Thumbnail with Play Icon overlay -->
                            <div class="w-24 h-24 bg-gray-100 rounded-2xl flex-none relative overflow-hidden">
                                <div class="absolute inset-0 flex items-center justify-center bg-black/10 text-white"><i class="ri-play-fill text-2xl"></i></div>
                                <!-- NEW: Tournament Badge -->
                                <div class="absolute top-0 right-0 bg-gray-900 text-white px-2 py-0.5 text-[10px] font-bold rounded-bl-lg">赛事</div>
                            </div>
                            <div class="flex-1 min-w-0">
                                <h3 class="text-lg font-bold text-gray-900 mb-1 leading-snug">外滩马年新春灯会实拍视频投稿</h3>
                                <div class="text-base text-gray-400">作者：小马老师</div>
                                <div class="mt-2 text-xs font-bold text-gray-900 bg-gray-100 inline-block px-2 rounded">v1.3.2a 赛事专属投稿</div>
                            </div>
                        </div>
                        <!-- Action Group -->
                        <div class="flex gap-3 mt-6">
                            <button class="flex-1 h-14 bg-white border border-gray-200 text-gray-400 rounded-xl font-bold flex items-center justify-center gap-2">
                                <i class="ri-close-line"></i> 驳回
                            </button>
                            <button class="flex-1 h-14 bg-gray-900 text-white rounded-xl font-bold flex items-center justify-center gap-2">
                                <i class="ri-check-line"></i> 通过发布
                            </button>
                        </div>
                    </div>

                    <!-- Regular Review Item 2 -->
                    <div class="p-6 border-b border-gray-50 opacity-60">
                        <div class="flex gap-4 mb-4">
                            <div class="w-24 h-24 bg-gray-100 rounded-2xl flex-none"></div>
                            <div class="flex-1">
                                <h3 class="text-lg font-normal text-gray-700 mb-1 truncate">邻里互助的一天...</h3>
                                <div class="text-sm text-gray-300">常规动态投稿</div>
                            </div>
                        </div>
                        <div class="flex gap-3 mt-4 text-center">
                            <div class="flex-1 h-12 border border-gray-100 rounded-lg text-gray-300 flex items-center justify-center">驳回</div>
                            <div class="flex-1 h-12 border border-gray-100 rounded-lg text-gray-300 flex items-center justify-center">通过</div>
                        </div>
                    </div>

                </div>

            </div>
        </div>

        <!-- Area B: Component Variants -->
        <div class="flex flex-col gap-10 w-[360px]">
             <div class="text-2xl font-bold text-gray-900">多状态展示</div>

             <!-- Variant 1: Rejection Reason Selection (Drawer Mock) -->
             <div class="flex flex-col">
                <div class="text-lg font-bold text-gray-700 mb-4 pl-3 border-l-4 border-gray-900">组件 I：驳回理由 (适老化)</div>
                <!-- Mock Mobile Container -->
                <div class="w-full h-[500px] bg-gray-50 border border-gray-200 rounded-3xl relative overflow-hidden shadow-inner">
                    <!-- Backdrop -->
                    <div class="absolute inset-0 bg-black/20"></div>
                    <!-- Drawer content -->
                    <div class="bg-white p-8 border-t border-gray-200 shadow-xl rounded-t-[40px] absolute bottom-0 left-0 w-full z-10">
                        <h4 class="text-xl font-bold text-gray-900 text-center mb-8">请选择驳回原因</h4>
                        <div class="space-y-4 mb-10">
                            <div class="h-14 bg-gray-50 rounded-2xl flex items-center px-6 text-lg font-bold text-gray-900 border border-gray-900">内容不符合赛事主题</div>
                            <div class="h-14 border border-gray-100 rounded-2xl flex items-center px-6 text-lg text-gray-400">画质过低或无法观看</div>
                            <div class="h-14 border border-gray-100 rounded-2xl flex items-center px-6 text-lg text-gray-400">内容涉及违规</div>
                        </div>
                        <button class="w-full h-16 bg-gray-900 text-white rounded-2xl text-xl font-bold">确定驳回</button>
                    </div>
                </div>
             </div>
        </div>

    </div>

</body>
</html>
