<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CC-7 社团提交作品表单 - 低保真线框图</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        body { background-color: #e5e7eb; }
    </style>
</head>
<body class="min-h-screen flex justify-center p-12 overflow-x-auto">

    <div id="artboard" class="flex flex-row items-start gap-24">
        
        <!-- Area A: Main View (Normal State - From Tournament Entry) -->
        <div class="flex flex-col">
            <div class="text-xl font-bold text-gray-900 mb-4">CC-7 社团提交作品表单 (状态 I：赛事投稿锁定态)</div>
            <div class="w-[375px] bg-white shadow-2xl border border-gray-200 relative p-0 overflow-hidden">
                
                <!-- Navbar -->
                <div class="h-16 flex items-center px-4 border-b border-gray-100">
                    <i class="ri-arrow-left-s-line text-2xl"></i>
                    <div class="flex-1 text-center font-bold text-gray-900">投稿作品</div>
                    <div class="w-10"></div>
                </div>

                <!-- Scroll Content -->
                <div class="p-6 h-auto pb-32">
                    
                    <!-- Media Upload Section -->
                    <div class="mb-8">
                        <div class="grid grid-cols-3 gap-3 mb-3">
                            <div class="aspect-square bg-gray-50 border-2 border-dashed border-gray-300 rounded-2xl flex flex-col items-center justify-center text-gray-400">
                                <i class="ri-add-line text-3xl"></i>
                                <span class="text-sm font-bold">0/9</span>
                            </div>
                        </div>
                        <p class="text-base text-gray-400">单个图片或视频建议小于 100M</p>
                    </div>

                    <!-- Form Fields -->
                    <div class="space-y-8">
                        <!-- Post Title -->
                        <div>
                            <label class="block text-xl font-bold text-gray-900 mb-3">作品名称</label>
                            <input type="text" placeholder="给作品起个好听的名字" class="w-full h-14 bg-white border border-gray-900 rounded-xl px-4 text-lg">
                        </div>

                        <!-- Tournament Selector (Locked Version) -->
                        <div>
                            <label class="block text-xl font-bold text-gray-900 mb-3">所属活动/赛事</label>
                            <div class="w-full h-14 bg-gray-50 border border-gray-200 rounded-xl px-4 flex items-center justify-between text-gray-400">
                                <div class="flex items-center gap-2">
                                    <i class="ri-medal-line"></i>
                                    <span class="text-lg font-medium text-gray-900">2026上海马年新春摄影大赛</span>
                                </div>
                                <i class="ri-lock-line"></i>
                            </div>
                            <p class="mt-2 text-base text-gray-400">赛事投稿已为您自动锁定</p>
                        </div>

                        <!-- Description -->
                        <div>
                            <label class="block text-xl font-bold text-gray-900 mb-3">作品说明 (选填)</label>
                            <textarea placeholder="在这里写下您的创作心得..." class="w-full h-32 bg-white border border-gray-300 rounded-xl p-4 text-lg resize-none"></textarea>
                        </div>

                        <!-- Author Info (Recap) -->
                        <div class="p-6 bg-gray-50 rounded-2xl space-y-4">
                            <h3 class="text-lg font-bold text-gray-400">作者信息 (仅主理人可见)</h3>
                            <div class="flex items-center justify-between">
                                <span class="text-lg text-gray-700">真实姓名</span>
                                <span class="text-lg font-bold text-gray-900">王大平</span>
                            </div>
                            <div class="flex items-center justify-between">
                                <span class="text-lg text-gray-700">联系电话</span>
                                <span class="text-lg font-bold text-gray-900">138****8888</span>
                            </div>
                        </div>
                    </div>

                </div>

                <!-- Footer Action -->
                <div class="absolute bottom-0 w-full bg-white p-6 border-t border-gray-100">
                    <button class="w-full h-14 bg-gray-900 text-white rounded-2xl text-xl font-bold tracking-widest">
                        提交作品
                    </button>
                </div>

            </div>
        </div>

        <!-- Area B: Component Variants -->
        <div class="flex flex-col gap-10 w-[360px]">
            <div class="text-2xl font-bold text-gray-900">多状态展示</div>

            <!-- Variant 1: Feedback Modal (Audit ON) -->
            <div class="flex flex-col">
                <div class="text-lg font-bold text-gray-700 mb-4 pl-3 border-l-4 border-gray-900">状态 II：投稿成功 (待审核态)</div>
                <div class="bg-black/5 p-12 flex items-center justify-center border border-gray-200 shadow-sm relative overflow-hidden">
                    <!-- Modal Overlay Look -->
                    <div class="bg-white p-8 rounded-3xl w-full shadow-2xl flex flex-col items-center text-center">
                        <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mb-6">
                            <i class="ri-check-line text-5xl text-gray-900"></i>
                        </div>
                        <h2 class="text-2xl font-bold text-gray-900 mb-3">投稿成功</h2>
                        <p class="text-lg text-gray-700 mb-8 leading-relaxed">
                            您的作品已提交，请等待团长审核通过后公开
                        </p>
                        <button class="w-full h-14 bg-gray-900 text-white rounded-2xl text-xl font-bold">我知道了</button>
                    </div>
                </div>
            </div>

            <!-- Variant 2: Tournament Selector Picker -->
            <div class="flex flex-col">
                <div class="text-lg font-bold text-gray-700 mb-4 pl-3 border-l-4 border-gray-900">组件 I：所属活动选择器</div>
                <div class="bg-white p-6 border border-gray-200 shadow-md">
                    <div class="space-y-4">
                        <div class="flex items-center justify-between p-4 bg-gray-50 border border-gray-900 rounded-2xl">
                            <div class="flex items-center gap-3">
                                <i class="ri-medal-fill text-gray-900"></i>
                                <span class="text-lg font-bold text-gray-900">马年新春摄影大赛</span>
                            </div>
                            <span class="text-base text-gray-400 font-bold italic">赛事</span>
                        </div>
                        <div class="flex items-center justify-between p-4 border border-gray-100 rounded-2xl">
                            <div class="flex items-center gap-3 text-gray-400">
                                <i class="ri-calendar-line"></i>
                                <span class="text-lg font-normal">周日太极拳晨练</span>
                            </div>
                            <span class="text-base text-gray-300">常规活动</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
