<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AD系列 赛事广告位合集 - 低保真线框图</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        body { background-color: #e5e7eb; }
    </style>
</head>
<body class="min-h-screen flex justify-center p-12 overflow-x-auto">

    <div id="artboard" class="flex flex-row items-start gap-24">
        
        <!-- Area A: AD-A3 (The Most Complex Modal State) -->
        <div class="flex flex-col">
            <div class="text-xl font-bold text-gray-900 mb-4">AD-A3 落地拉票引导弹层 (状态 I：互动拉票中)</div>
            <div class="w-[375px] h-[667px] bg-black/40 relative flex items-center justify-center p-8 border border-gray-300">
                <!-- Modal Body -->
                <div class="bg-white w-full rounded-[48px] overflow-hidden shadow-2xl relative">
                    <!-- Close Ghost Button -->
                    <div class="absolute top-6 right-6 z-10">
                        <i class="ri-close-line text-2xl text-white/80 bg-black/20 rounded-full p-2"></i>
                    </div>

                    <!-- Main Visual -->
                    <div class="aspect-[1.2/1] bg-gray-200 relative">
                        <!-- Text Overlay on Image -->
                        <div class="absolute inset-0 flex flex-col items-center justify-center px-6 text-center">
                            <div class="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center mb-4"><i class="ri-star-smile-fill text-4xl text-white"></i></div>
                            <h2 class="text-3xl font-black text-white leading-tight drop-shadow-lg">帮我点个赞吧！</h2>
                            <p class="mt-3 text-lg text-white font-medium drop-shadow-md">您的助力能帮我赢取摄影大奖</p>
                        </div>
                        <div class="absolute bottom-0 left-0 w-full h-1/3 bg-gradient-to-t from-white to-transparent"></div>
                    </div>

                    <!-- Actions -->
                    <div class="p-8 space-y-4">
                        <button class="w-full h-16 bg-gray-900 text-white rounded-2xl text-xl font-bold flex items-center justify-center gap-3">
                            <i class="ri-heart-3-fill"></i> 帮 TA 点赞
                        </button>
                        <button class="w-full h-14 bg-white border border-gray-200 text-gray-700 rounded-xl text-lg font-medium">
                            去看看更多精彩作品
                        </button>
                        <button class="w-full text-center text-base text-gray-400 font-bold py-2">
                            直接进入详情页
                        </button>
                    </div>

                    <!-- Sponsorship Footer -->
                    <div class="p-4 bg-gray-50 flex items-center justify-center gap-2 border-t border-gray-100">
                        <div class="w-5 h-5 bg-gray-200 rounded"></div>
                        <span class="text-xs text-gray-300 font-bold uppercase tracking-widest">Sponsored by Lecai Platform</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Area B: AD-A2 & Banner Samples -->
        <div class="flex flex-col gap-10 w-[360px]">
            <div class="text-2xl font-bold text-gray-900">多状态展示</div>

            <!-- AD-A2 Sample -->
            <div class="flex flex-col">
                <div class="text-lg font-bold text-gray-700 mb-4 pl-3 border-l-4 border-gray-900">AD-A2：邀请参赛引导 (转化态)</div>
                <div class="bg-white p-6 border border-gray-200 shadow-md">
                    <div class="aspect-video bg-gray-900 rounded-2xl mb-6 flex flex-col items-center justify-center text-white p-6 text-center">
                         <h4 class="text-xl font-bold mb-2 tracking-tighter">赛事邀请函</h4>
                         <p class="text-xs text-white/50">诚邀各位银发摄影家参赛</p>
                    </div>
                    <button class="w-full h-14 bg-gray-900 text-white rounded-xl text-lg font-bold">立即去参赛 (万元大奖)</button>
                    <button class="w-full text-sm text-gray-400 mt-4 text-center">稍后再说</button>
                </div>
            </div>

            <!-- AD-A5 & AD-A7 Common Item -->
            <div class="flex flex-col">
                <div class="text-lg font-bold text-gray-700 mb-4 pl-3 border-l-4 border-gray-900">AD-A5/A7：通栏通用 Banner</div>
                <div class="bg-white p-6 border border-gray-200 shadow-md">
                    <!-- The Banner Component -->
                    <div class="relative w-full h-24 bg-gray-50 border border-gray-100 rounded-xl overflow-hidden flex items-center justify-center">
                        <span class="text-gray-200 font-bold italic tracking-widest uppercase text-xl">BRAND BANNER</span>
                        <div class="absolute top-2 right-2 bg-black/5 text-[10px] px-1.5 rounded text-gray-400">广告 / 赞助</div>
                        <!-- Indicator dots -->
                        <div class="absolute bottom-2 left-1/2 -translate-x-1/2 flex gap-1">
                             <div class="w-1.5 h-1.5 bg-gray-300 rounded-full"></div>
                             <div class="w-3 h-1.5 bg-gray-900 rounded-full"></div>
                             <div class="w-1.5 h-1.5 bg-gray-300 rounded-full"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
