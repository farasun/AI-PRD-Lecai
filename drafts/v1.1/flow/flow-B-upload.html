<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Low-Fi Flow Map · 流程B · 上传作品得积分</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .bg-dot-grid {
            background-image: radial-gradient(circle, #cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>

<body class="m-0 p-0 bg-gray-200 no-scrollbar">

    <!-- 悬浮标题板 -->
    <div
        style="position:fixed;top:24px;left:24px;z-index:50;background:rgba(17,24,39,0.85);backdrop-filter:blur(8px);border-radius:12px;padding:12px 20px;">
        <div style="font-size:16px;font-weight:700;color:#fff;">积分流程B · 上传作品得积分</div>
        <div style="font-size:12px;color:#9ca3af;margin-top:4px;">v1.1 · Low-Fi Flow Map · 2026-03-04</div>
    </div>

    <!-- 画布 -->
    <div class="relative bg-dot-grid w-[2200px] h-[1000px] no-scrollbar font-sans text-gray-900">

        <!-- SVG 连线层 -->
        <svg class="absolute inset-0 w-full h-full pointer-events-none z-0">
            <defs>
                <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                    <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8" />
                </marker>
            </defs>

            <!-- B1 → B2 -->
            <path d="M 344 414 C 470 414, 470 414, 598 414" stroke="#94a3b8" stroke-width="2" fill="none"
                marker-end="url(#arrow-gray)" />
            <rect x="365" y="399" width="190" height="28" fill="#f8fafc" rx="4" />
            <text x="460" y="418" fill="#64748b" font-size="13" font-weight="500" text-anchor="middle">点击[上传我的作品]</text>

            <!-- B2 → B3 -->
            <path d="M 844 414 C 970 414, 970 414, 1098 414" stroke="#94a3b8" stroke-width="2" fill="none"
                marker-end="url(#arrow-gray)" />
            <rect x="875" y="399" width="160" height="28" fill="#f8fafc" rx="4" />
            <text x="955" y="418" fill="#64748b" font-size="13" font-weight="500" text-anchor="middle">提交成功并返回</text>
        </svg>

        <!-- Node B1: CC-5 社团活动详情 -->
        <div class="absolute" style="left: 100px; top: 150px;">
            <div id="CC-5"
                class="absolute -top-10 left-0 bg-gray-900 text-white text-sm px-3 py-1 rounded shadow-sm z-10">CC-5 ·
                社团活动详情</div>
            <div
                class="w-[375px] h-[812px] bg-white border border-gray-200 rounded-[40px] shadow-2xl overflow-hidden transform scale-[0.65] origin-top-left flex flex-col relative">
                <!-- Navbar -->
                <div class="h-14 flex items-center justify-between px-4 border-b border-gray-100 flex-shrink-0">
                    <div class="flex items-center text-gray-900">
                        <i class="ri-arrow-left-s-line text-2xl mr-1"></i>
                        <span class="font-normal text-sm">返回社团</span>
                    </div>
                    <span class="font-bold text-lg">春日摄影展</span>
                    <i class="ri-more-2-fill text-xl text-gray-400"></i>
                </div>
                <!-- Cover -->
                <div class="h-36 bg-gray-100 flex items-center justify-center flex-shrink-0">
                    <i class="ri-image-line text-5xl text-gray-200"></i>
                </div>
                <!-- Info -->
                <div class="px-5 py-3 border-b border-gray-100 flex-shrink-0">
                    <div class="font-bold text-base text-gray-900 mb-1">春日摄影展</div>
                    <div class="text-xs font-normal text-gray-400">2026-03-04 · 23 件作品</div>
                </div>
                <!-- Grid -->
                <div class="flex-1 grid grid-cols-2 gap-2 p-3 bg-gray-50 pb-20">
                    <div class="h-28 bg-gray-100 rounded-xl flex items-center justify-center">
                        <i class="ri-image-2-line text-2xl text-gray-200"></i>
                    </div>
                    <div class="h-28 bg-gray-100 rounded-xl flex items-center justify-center">
                        <i class="ri-image-2-line text-2xl text-gray-200"></i>
                    </div>
                    <div class="h-28 bg-gray-100 rounded-xl flex items-center justify-center">
                        <i class="ri-image-2-line text-2xl text-gray-200"></i>
                    </div>
                    <div class="h-28 bg-gray-100 rounded-xl flex items-center justify-center">
                        <i class="ri-image-2-line text-2xl text-gray-200"></i>
                    </div>
                </div>
                <!-- Bottom bar -->
                <div class="absolute bottom-0 w-full p-4 bg-white border-t border-gray-100 pb-8 z-40">
                    <div
                        class="h-12 bg-gray-900 rounded-full flex items-center justify-center text-white font-medium shadow-md">
                        <i class="ri-add-line mr-1 text-lg"></i> 上传我的作品
                    </div>
                </div>
            </div>
        </div>

        <!-- Node B2: CC-7 社团提交作品表单 -->
        <div class="absolute" style="left: 600px; top: 150px;">
            <div id="CC-7"
                class="absolute -top-10 left-0 bg-gray-900 text-white text-sm px-3 py-1 rounded shadow-sm z-10">CC-7 ·
                社团提交作品表单</div>
            <div
                class="w-[375px] h-[812px] bg-white border border-gray-200 rounded-[40px] shadow-2xl overflow-hidden transform scale-[0.65] origin-top-left flex flex-col relative">
                <!-- Navbar -->
                <div class="h-14 flex items-center px-4 border-b border-gray-100 flex-shrink-0">
                    <div class="flex items-center text-gray-900">
                        <i class="ri-arrow-left-s-line text-2xl mr-1"></i>
                        <span class="font-normal text-sm text-gray-500">取消</span>
                    </div>
                </div>
                <!-- Media preview -->
                <div class="p-4 flex gap-2 border-b border-gray-50 flex-shrink-0">
                    <div
                        class="w-24 h-24 bg-gray-200 rounded-xl flex-shrink-0 relative flex items-center justify-center">
                        <span
                            class="absolute top-1 left-1 bg-black bg-opacity-50 text-white text-[10px] px-1 rounded">封面</span>
                        <div
                            class="absolute -top-1 -right-1 w-5 h-5 bg-white rounded-full shadow border border-gray-100 flex items-center justify-center">
                            <i class="ri-close-line text-gray-400 text-[10px]"></i>
                        </div>
                        <i class="ri-image-fill text-gray-300 text-xl"></i>
                    </div>
                    <div
                        class="w-24 h-24 bg-gray-200 rounded-xl flex-shrink-0 relative flex items-center justify-center">
                        <div
                            class="absolute -top-1 -right-1 w-5 h-5 bg-white rounded-full shadow border border-gray-100 flex items-center justify-center">
                            <i class="ri-close-line text-gray-400 text-[10px]"></i>
                        </div>
                        <i class="ri-image-fill text-gray-300 text-xl"></i>
                    </div>
                    <div
                        class="w-24 h-24 border-2 border-dashed border-gray-200 bg-gray-50 rounded-xl flex items-center justify-center text-gray-300">
                        <i class="ri-add-line text-3xl"></i>
                    </div>
                </div>
                <!-- Points hint -->
                <div
                    class="mx-4 mt-4 bg-gray-50 rounded-xl p-3 flex items-center gap-3 border border-gray-100 flex-shrink-0">
                    <i class="ri-copper-coin-line text-gray-400"></i>
                    <span class="text-sm font-normal text-gray-600">上传后可获得 10 积分</span>
                </div>
                <!-- Form text area -->
                <div class="flex-1 p-4 overflow-hidden">
                    <div class="text-lg font-bold text-gray-300 mb-3">添加标题（选填）</div>
                    <div class="border-t border-gray-100 my-3"></div>
                    <div class="text-sm font-normal text-gray-300">添加文字说明（选填）</div>
                    <!-- Locked activity info -->
                    <div
                        class="mt-8 bg-gray-50 rounded-xl p-3 flex items-center justify-between border border-gray-100">
                        <div class="flex items-center gap-2">
                            <i class="ri-bookmark-fill text-gray-400"></i>
                            <span class="text-sm font-normal text-gray-600">所属活动：春日摄影展</span>
                        </div>
                        <i class="ri-lock-2-line text-gray-400"></i>
                    </div>
                </div>
                <!-- Bottom bar -->
                <div class="absolute bottom-0 w-full p-4 bg-white border-t border-gray-100 pb-8 z-40">
                    <div
                        class="h-14 bg-gray-900 rounded-full flex items-center justify-center text-white text-lg font-bold shadow-2xl">
                        发布
                    </div>
                </div>
            </div>
        </div>

        <!-- Node B3: CC-5 积分到账Toast -->
        <div class="absolute" style="left: 1100px; top: 150px;">
            <div id="CC-5-toast"
                class="absolute -top-10 left-0 bg-gray-900 text-white text-sm px-3 py-1 rounded shadow-sm z-10">CC-5 ·
                社团活动详情（积分到账Toast）</div>
            <div
                class="w-[375px] h-[812px] bg-white border border-gray-200 rounded-[40px] shadow-2xl overflow-hidden transform scale-[0.65] origin-top-left flex flex-col relative opacity-95">
                <!-- Navbar -->
                <div class="h-14 flex items-center justify-between px-4 border-b border-gray-100 flex-shrink-0">
                    <div class="flex items-center text-gray-900">
                        <i class="ri-arrow-left-s-line text-2xl mr-1"></i>
                        <span class="font-normal text-sm">返回社团</span>
                    </div>
                    <span class="font-bold text-lg">春日摄影展</span>
                    <i class="ri-more-2-fill text-xl text-gray-400"></i>
                </div>
                <!-- Toast -->
                <div
                    class="mx-5 mt-4 bg-gray-900 text-white px-4 py-3 rounded-2xl text-center text-sm font-medium flex-shrink-0">
                    您的作品已入库，获得 10 积分！
                </div>
                <!-- Cover -->
                <div class="h-28 bg-gray-100 flex items-center justify-center flex-shrink-0 mt-3 opacity-50">
                    <i class="ri-image-line text-5xl text-gray-200"></i>
                </div>
                <!-- Grid (dimmed) -->
                <div class="flex-1 grid grid-cols-2 gap-2 p-3 bg-gray-50 pb-20 opacity-40">
                    <div class="h-28 bg-gray-100 rounded-xl flex items-center justify-center">
                        <i class="ri-image-2-line text-2xl text-gray-200"></i>
                    </div>
                    <div class="h-28 bg-gray-100 rounded-xl flex items-center justify-center">
                        <i class="ri-image-2-line text-2xl text-gray-200"></i>
                    </div>
                    <div class="h-28 bg-gray-100 rounded-xl flex items-center justify-center">
                        <i class="ri-image-2-line text-2xl text-gray-200"></i>
                    </div>
                    <div class="h-28 bg-gray-100 rounded-xl flex items-center justify-center">
                        <i class="ri-image-2-line text-2xl text-gray-200"></i>
                    </div>
                </div>
                <!-- Bottom bar -->
                <div class="absolute bottom-0 w-full p-4 bg-white border-t border-gray-100 pb-8 z-40">
                    <div
                        class="h-12 bg-gray-900 rounded-full flex items-center justify-center text-white font-medium shadow-md">
                        <i class="ri-add-line mr-1 text-lg"></i> 上传我的作品
                    </div>
                </div>
            </div>
        </div>

    </div>
</body>

</html>
