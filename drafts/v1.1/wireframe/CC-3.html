<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CC-3 主导航-我的</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet" />
  <style>
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>

<body class="bg-gray-200 min-h-screen flex justify-center p-12 overflow-x-auto no-scrollbar">

  <!-- Artboard -->
  <div class="flex flex-row items-start gap-24">

    <!-- 主视图（左栏） -->
    <div class="flex flex-col gap-3">
      <!-- 页面标题 -->
      <p class="text-xl font-bold text-gray-900 mb-4">CC-3 主导航-我的 (v1.1 增量版)</p>

      <!-- 手机画板容器 (抽象为黑白灰) -->
      <div
        class="w-[375px] h-auto bg-white shadow-2xl border border-gray-200 relative overflow-hidden flex flex-col no-scrollbar rounded-none">

        <!-- 1. Hero Header (Abstracted to Grayscale) -->
        <div class="bg-gray-100 h-48 p-6 pt-10 relative shrink-0">
          <!-- Status Bar Placeholder -->
          <div class="flex justify-between items-center text-gray-400 mb-6 font-bold">
            <span class="text-sm">21:02</span>
            <div class="flex gap-1 items-center">
              <i class="ri-signal-tower-fill"></i>
              <i class="ri-wifi-line"></i>
              <i class="ri-battery-2-fill"></i>
            </div>
          </div>
          <!-- Menu Pill -->
          <div
            class="absolute right-4 top-14 bg-white border border-gray-200 rounded-full px-3 py-1 flex gap-2 text-gray-900">
            <i class="ri-more-fill"></i>
            <span class="w-px h-4 bg-gray-200 self-center"></span>
            <i class="ri-checkbox-blank-circle-line"></i>
          </div>
          <!-- User Info Area -->
          <div class="flex items-center gap-4 mt-2">
            <div
              class="w-16 h-16 rounded-full border border-gray-200 overflow-hidden bg-gray-50 flex items-center justify-center">
              <i class="ri-user-3-fill text-gray-300 text-4xl mt-3"></i>
            </div>
            <div class="text-gray-900 relative flex-1">
              <div class="text-xl font-bold flex items-center justify-between">
                法拉孙Fara
                <i class="ri-arrow-right-s-line text-2xl text-gray-400"></i>
              </div>
              <div class="text-base text-gray-400 mt-1">5 获赞</div>
            </div>
          </div>
        </div>

        <!-- Body Content -->
        <div class="flex-1 -mt-4 rounded-t-3xl bg-white p-4 space-y-4">

          <!-- 2. 我的社团 (Grid Layout - Abstracted) -->
          <div class="text-xl font-bold text-gray-900 px-1">我的社团</div>
          <div class="grid grid-cols-2 gap-4">
            <div class="bg-white p-4 rounded-3xl border border-gray-200 shadow-sm flex flex-col gap-2">
              <div class="w-10 h-10 bg-gray-100 rounded-2xl flex items-center justify-center">
                <i class="ri-group-line text-gray-900 text-xl"></i>
              </div>
              <div class="font-bold text-gray-900">我加入的</div>
              <div class="text-base text-gray-400 font-normal">已加入 2 个</div>
            </div>
            <div class="bg-white p-4 rounded-3xl border border-gray-200 shadow-sm flex flex-col gap-2">
              <div class="w-10 h-10 bg-gray-100 rounded-2xl flex items-center justify-center">
                <i class="ri-settings-3-line text-gray-900 text-xl"></i>
              </div>
              <div class="font-bold text-gray-900">团长工作台</div>
              <div class="text-base text-gray-400 font-normal">管理我的社团</div>
            </div>
          </div>

          <!-- 3. [V1.1] 积分卡片 (强视觉锚点) -->
          <div class="bg-white p-6 rounded-3xl border border-gray-900 shadow-lg">
            <div class="flex justify-between items-center mb-1">
              <span class="text-lg text-gray-700 font-normal">我的积分</span>
              <i class="ri-arrow-right-s-line text-gray-400"></i>
            </div>
            <div class="text-4xl font-bold text-gray-900 mb-4">128</div>
            <!-- Primary Action Button -->
            <div
              class="h-14 bg-gray-900 text-white rounded-2xl flex items-center justify-center font-medium text-lg cursor-pointer">
              今日签到 +3 积分
            </div>
          </div>

          <!-- 4. 我的作品 (Horizontal Scroll - Abstracted) -->
          <div class="flex justify-between items-center px-1">
            <div class="text-xl font-bold text-gray-900">我的作品 (36)</div>
            <div class="text-base text-gray-400 flex items-center font-normal">查看全部 <i
                class="ri-arrow-right-s-line ml-1"></i>
            </div>
          </div>
          <div class="flex gap-3 overflow-x-auto no-scrollbar pb-2">
            <div
              class="w-32 h-32 bg-gray-100 rounded-2xl shrink-0 relative overflow-hidden flex items-center justify-center">
              <div
                class="absolute top-2 left-2 bg-white border border-gray-200 text-gray-900 text-xs px-2 py-0.5 rounded font-bold">
                已发布</div>
              <i class="ri-image-line text-gray-300 text-3xl"></i>
            </div>
            <div
              class="w-32 h-32 bg-gray-100 rounded-2xl shrink-0 relative overflow-hidden flex items-center justify-center">
              <div
                class="absolute top-2 left-2 bg-white border border-gray-200 text-gray-900 text-xs px-2 py-0.5 rounded font-bold">
                已发布</div>
              <i class="ri-image-line text-gray-300 text-3xl"></i>
            </div>
            <div
              class="w-32 h-32 bg-gray-100 rounded-2xl shrink-0 relative overflow-hidden flex items-center justify-center">
              <div
                class="absolute top-2 left-2 bg-white border border-gray-200 text-gray-400 text-xs px-2 py-0.5 rounded font-bold">
                未发布</div>
              <i class="ri-image-line text-gray-200 text-3xl opacity-50"></i>
            </div>
          </div>
        </div>

        <!-- 5. 底部 Tabbar -->
        <div class="h-20 bg-white border-t border-gray-200 flex items-center justify-around px-6 shrink-0">
          <div class="flex flex-col items-center gap-1 opacity-30">
            <i class="ri-home-5-line text-2xl"></i>
            <span class="text-base font-normal">社团</span>
          </div>
          <div class="flex flex-col items-center gap-1 opacity-30">
            <i class="ri-trophy-line text-2xl"></i>
            <span class="text-base font-normal">赛事</span>
          </div>
          <div class="flex flex-col items-center gap-1 text-gray-900">
            <i class="ri-user-3-fill text-2xl"></i>
            <span class="text-base font-bold">我的</span>
          </div>
        </div>

      </div>
    </div>

    <!-- 变体展示单元 (右栏) -->
    <div class="flex flex-col gap-10 w-[360px]">
      <div class="text-xl font-bold text-gray-900">多状态展示</div>

      <!-- 状态 II：已签到态 -->
      <div class="bg-white p-6 border border-gray-200 shadow-md rounded-none">
        <div class="text-lg font-bold text-gray-700 mb-4 pl-3 border-l-4 border-gray-900">状态：已签到态</div>
        <div class="p-6 rounded-3xl border border-gray-200 bg-gray-50 opacity-80">
          <div class="flex justify-between items-center mb-1">
            <span class="text-base text-gray-400 font-normal">我的积分</span>
          </div>
          <div class="text-4xl font-bold text-gray-900 mb-4">131</div>
          <div
            class="h-14 border border-gray-300 text-gray-400 rounded-2xl flex items-center justify-center font-medium text-lg bg-white">
            今日已完成签到 ✓
          </div>
        </div>
      </div>
    </div>
    <!-- /右栏 -->

  </div>
  <!-- /Artboard -->

</body>

</html>
