<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CC-6 社团作品详情 - 线框图 (ChatD v1.4)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-gray-200 min-h-screen flex justify-center p-12 overflow-x-auto">

    <div id="artboard" class="flex flex-row items-start gap-24">

        <!-- ============================================================
             区域 A：主视图 (CC-6 社团作品详情)
        ============================================================= -->
        <div class="flex flex-col">
            <h2 class="text-xl font-bold text-gray-900 mb-4">CC-6 社团作品详情 (状态 I：大图沉浸态)</h2>

            <div
                class="w-[375px] h-auto min-h-[812px] bg-white shadow-2xl border border-gray-200 relative p-0 overflow-hidden rounded-none flex flex-col">

                <!-- 顶导 (h-16) -->
                <div
                    class="h-16 flex items-center justify-between px-4 border-b border-gray-100 bg-white sticky top-0 z-50">
                    <div class="flex items-center gap-1 text-gray-900 w-20">
                        <i class="ri-arrow-left-s-line text-2xl"></i>
                        <span class="text-lg">返回</span>
                    </div>
                    <span class="text-xl font-bold text-gray-900">作品详情</span>
                    <div class="flex items-center justify-end w-20 space-x-3 text-gray-900">
                        <i class="ri-more-fill text-2xl"></i>
                        <i class="ri-record-circle-line text-2xl text-gray-400"></i>
                    </div>
                </div>

                <!-- 社团导航栏 (紧贴顶导) -->
                <div
                    class="h-14 bg-white flex items-center justify-between px-4 border-b border-gray-100 relative z-10">
                    <div class="flex items-center text-lg font-normal text-gray-900">
                        <div class="w-8 h-8 bg-gray-200 rounded-full mr-3 flex items-center justify-center">
                            <i class="ri-group-line text-gray-500"></i>
                        </div>
                        相望于疆湖
                    </div>
                    <span class="text-gray-900 text-base font-normal flex items-center">
                        进入社团 <i class="ri-arrow-right-s-line text-xl ml-1 text-gray-400"></i>
                    </span>
                </div>

                <div class="flex-1 overflow-y-auto no-scrollbar bg-gray-50 flex flex-col">

                    <!-- !!! 大图先导：照片轮播立刻呈现 !!! -->
                    <div
                        class="w-full h-[375px] bg-gray-100 flex flex-col items-center justify-center relative border-b border-gray-200">
                        <i class="ri-image-2-line text-5xl text-gray-400"></i>
                        <!-- 底部滑块占位 -->
                        <div class="absolute bottom-4 left-0 w-full flex justify-center space-x-2">
                            <div class="w-2 h-2 rounded-full bg-gray-900"></div>
                            <div class="w-2 h-2 rounded-full bg-gray-300"></div>
                            <div class="w-2 h-2 rounded-full bg-gray-300"></div>
                        </div>

                    </div>

                    <!-- 下沉：作者与阅读区 -->
                    <div class="bg-white p-6 border-b border-gray-100">
                        <!-- 作者源阵列 -->
                        <div class="flex items-center justify-between mb-4">
                            <div class="flex items-center">
                                <div class="w-12 h-12 bg-gray-200 rounded-full mr-3 flex items-center justify-center">
                                    <i class="ri-user-3-line text-gray-500 text-xl"></i>
                                </div>
                                <div class="flex flex-col">
                                    <div class="text-lg font-bold text-gray-900">法拉孙Fara</div>
                                    <div class="text-base text-gray-400 font-normal mt-0.5">2026-02-06 11:15:29</div>
                                </div>
                            </div>
                        </div>

                        <!-- 极简活动标签 (从上部抽离，下沉融合) -->
                        <div class="border border-gray-200 rounded-xl px-4 py-3 flex items-center justify-between mb-6">
                            <div class="flex items-center text-lg text-gray-900 font-normal">
                                <i class="ri-bookmark-line text-gray-500 mr-2 text-xl"></i>
                                <span>所属的活动</span>
                            </div>
                            <i class="ri-arrow-right-s-line text-2xl text-gray-400"></i>
                        </div>

                        <!-- 作品核心图文 -->
                        <div>
                            <h1 class="text-2xl font-bold text-gray-900 mb-3">冰 鱼</h1>
                            <p class="text-lg text-gray-700 leading-relaxed font-normal">
                                今天雾气蒙蒙，但是红叶十分鲜亮，拍了几张给大家欣赏。池塘里的冰鱼非常有生机。
                            </p>
                            <!-- 占位模拟多行溢出可展开 -->
                            <div class="flex justify-end mt-2">
                                <span class="text-base text-gray-500 font-normal flex items-center">
                                    展开 <i class="ri-arrow-down-s-line text-xl ml-1"></i>
                                </span>
                            </div>
                        </div>
                    </div>

                    <!-- 互动数据与评论区 -->
                    <div class="bg-white p-6 pb-24 mt-2">
                        <!-- 操作大按钮组 -->
                        <div class="flex space-x-4 border-b border-gray-100 pb-6 mb-6">
                            <button
                                class="flex-1 h-14 bg-gray-50 border border-gray-200 rounded-xl flex items-center justify-center text-lg font-normal text-gray-900">
                                <i class="ri-thumb-up-line mr-2 text-xl"></i> 点赞 2
                            </button>
                            <button
                                class="flex-1 h-14 bg-gray-50 border border-gray-200 rounded-xl flex items-center justify-center text-lg font-normal text-gray-900">
                                <i class="ri-share-forward-line mr-2 text-xl"></i> 分享 0
                            </button>
                        </div>

                        <div class="text-xl font-bold text-gray-900 mb-6">全部评论 (0)</div>

                        <div class="flex flex-col items-center justify-center py-10">
                            <span class="text-base text-gray-400 font-normal">已经到底啦</span>
                        </div>
                    </div>

                </div>

                <!-- 底部悬浮评论框 -->
                <div class="absolute bottom-0 w-full p-4 bg-white border-t border-gray-200 z-20 pb-8">
                    <div class="h-14 bg-gray-50 border border-gray-200 rounded-xl px-4 flex items-center">
                        <span class="text-gray-400 text-lg font-normal">请输入你的评论</span>
                    </div>
                </div>

            </div>
        </div>

        <!-- ============================================================
             区域 B：组件变体集
        ============================================================= -->
        <div class="flex flex-col gap-10 w-[360px]">
            <h2 class="text-xl font-bold text-gray-900">多状态展示</h2>

            <!-- 变体 1：无正文空缺态 -->
            <div class="flex flex-col">
                <h3 class="text-lg font-bold text-gray-700 mb-4 pl-3 border-l-4 border-gray-900">CC-6 社团作品详情 (状态
                    II：无正文空缺态)</h3>
                <div class="bg-white p-0 border border-gray-200 shadow-md rounded-none overflow-hidden">

                    <!-- 截取图文溯源与阅读下沉区 -->
                    <div class="p-6 border-b border-gray-100">
                        <!-- 作者源阵列 (保留) -->
                        <div class="flex items-center justify-between mb-4">
                            <div class="flex items-center">
                                <div class="w-12 h-12 bg-gray-200 rounded-full mr-3 flex items-center justify-center">
                                    <i class="ri-user-3-line text-gray-500 text-xl"></i>
                                </div>
                                <div class="flex flex-col">
                                    <div class="text-lg font-bold text-gray-900">法拉孙Fara</div>
                                    <div class="text-base text-gray-400 font-normal mt-0.5">2026-02-06 11:15:29</div>
                                </div>
                            </div>
                        </div>

                        <!-- 极简活动标签 (保留，但去掉了 mb-6) -->
                        <div class="border border-gray-200 rounded-xl px-4 py-3 flex items-center justify-between">
                            <div class="flex items-center text-lg text-gray-900 font-normal">
                                <i class="ri-bookmark-line text-gray-500 mr-2 text-xl"></i>
                                <span>所属的活动</span>
                            </div>
                            <i class="ri-arrow-right-s-line text-2xl text-gray-400"></i>
                        </div>

                        <!-- 核心变动区：正文区域被完全屏蔽/移除 -->

                    </div>

                    <!-- 互动面板紧接其下 (模拟自然拼接) -->
                    <div class="bg-white p-6 pb-6 bg-gray-50 opacity-60">
                        <div class="flex space-x-4 border-gray-100 mb-4">
                            <div
                                class="flex-1 h-14 bg-white border border-gray-200 rounded-xl flex items-center justify-center text-lg font-normal text-gray-900">
                                <i class="ri-thumb-up-line mr-2 text-xl"></i> 点赞 2
                            </div>
                            <div
                                class="flex-1 h-14 bg-white border border-gray-200 rounded-xl flex items-center justify-center text-lg font-normal text-gray-900">
                                <i class="ri-share-forward-line mr-2 text-xl"></i> 分享 0
                            </div>
                        </div>
                        <div class="text-base text-gray-500 text-center font-normal">
                            (文字组件被折叠机制移除，作者信息与点赞区自然握手)
                        </div>
                    </div>
                </div>
            </div>

        </div>

    </div>

</body>

</html>
