<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CC-7 社团提交作品表单 - 线框图 (ChatD v1.4)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 模拟拖拽交互感 */
        .draggable-item {
            cursor: grab;
        }

        .draggable-item:active {
            cursor: grabbing;
            opacity: 0.7;
        }
    </style>
</head>

<body class="bg-gray-200 min-h-screen flex justify-center p-12 overflow-x-auto">

    <div id="artboard" class="flex flex-row items-start justify-center w-full py-12">

        <!-- ============================================================
             主视图：CC-7 社团提交作品表单 (状态 I：只读锁定态)
        ============================================================= -->
        <div class="flex flex-col">
            <h2 class="text-xl font-bold text-gray-900 mb-4 text-center">CC-7 社团提交作品表单 (状态 I：待发布)</h2>

            <div
                class="w-[375px] h-auto min-h-[812px] bg-white shadow-2xl border border-gray-200 relative p-0 overflow-hidden rounded-none flex flex-col">

                <!-- 顶部导航 (h-16) -->
                <div
                    class="h-16 flex items-center justify-between px-4 border-b border-gray-100 bg-white sticky top-0 z-50">
                    <div class="flex items-center gap-1 text-gray-900 w-20">
                        <i class="ri-arrow-left-s-line text-2xl"></i>
                        <span class="text-lg font-normal">返回</span>
                    </div>
                    <span class="text-xl font-bold text-gray-900">发布作品</span>
                    <div class="w-20 text-right font-medium text-gray-400">确认</div>
                </div>

                <div class="flex-1 flex flex-col">
                    <!-- 模块：待审核媒体陈列区 (统一方形阵列) -->
                    <div class="p-6 grid grid-cols-3 gap-3 border-b border-gray-100 bg-gray-50/30">
                        <!-- 已选媒体 1 (自动封面) -->
                        <div
                            class="aspect-square bg-white border border-gray-900 rounded-xl relative flex items-center justify-center overflow-hidden shadow-sm">
                            <i class="ri-image-2-line text-3xl text-gray-300"></i>
                            <div
                                class="absolute top-0 left-0 bg-gray-900 text-white text-[10px] px-2 py-0.5 rounded-br-lg font-medium tracking-tighter">
                                封面</div>
                            <!-- 删除按钮 -->
                            <div
                                class="absolute top-1 right-1 w-5 h-5 bg-white border border-gray-200 rounded-full flex items-center justify-center shadow-sm">
                                <i class="ri-close-line text-sm text-gray-900"></i>
                            </div>
                        </div>

                        <!-- 已选媒体 2 -->
                        <div
                            class="aspect-square bg-white border border-gray-200 rounded-xl relative flex items-center justify-center overflow-hidden shadow-sm">
                            <i class="ri-image-2-line text-3xl text-gray-300"></i>
                            <div
                                class="absolute top-1 right-1 w-5 h-5 bg-white border border-gray-200 rounded-full flex items-center justify-center shadow-sm">
                                <i class="ri-close-line text-sm text-gray-900"></i>
                            </div>
                        </div>

                        <!-- 继续追加入口 -->
                        <div
                            class="aspect-square border border-dashed border-gray-300 bg-white rounded-xl flex flex-col items-center justify-center text-gray-400">
                            <i class="ri-add-line text-3xl"></i>
                        </div>
                    </div>

                    <!-- 模块：表单录入区 (极简叙事) -->
                    <div class="p-6 flex flex-col gap-6">
                        <!-- 作品标题 -->
                        <input type="text"
                            class="w-full h-14 bg-white border border-gray-900 rounded-xl px-4 text-lg font-normal text-gray-900 placeholder-gray-300 outline-none"
                            placeholder="给作品起个名字 (选填)">

                        <!-- 作品正文 -->
                        <textarea
                            class="w-full text-lg font-normal text-gray-700 placeholder-gray-300 bg-white border border-gray-200 rounded-xl p-4 resize-none outline-none min-h-[160px]"
                            placeholder="这一刻的心情 or 故事..."></textarea>
                    </div>

                    <!-- 模块：归属活动 (锁定态) -->
                    <div class="p-6 mt-auto">
                        <div class="flex flex-col gap-2">
                            <span class="text-base text-gray-400 pl-1">发布到活动</span>
                            <div
                                class="w-full h-14 bg-gray-50 border border-gray-100 rounded-xl px-4 flex items-center justify-between">
                                <span class="text-lg font-bold text-gray-900">2026年1月23日 塔川行</span>
                                <i class="ri-lock-2-line text-gray-300 text-xl"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 底部提交指令 -->
                <div class="p-6 bg-white border-t border-gray-100 pb-10">
                    <button
                        class="w-full h-14 bg-gray-900 rounded-2xl flex items-center justify-center text-white text-lg font-bold shadow-xl">
                        立即发布
                    </button>
                </div>
            </div>
        </div>

    </div>

</body>

</html>
