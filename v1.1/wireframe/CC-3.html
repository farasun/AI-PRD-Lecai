<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CC-3 主导航-我的</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet" />
</head>
<body class="bg-gray-200 min-h-screen flex justify-center p-12 overflow-x-auto">

  <!-- Artboard -->
  <div class="flex flex-row items-start gap-24">

    <!-- 主视图（左栏） -->
    <div class="flex flex-col gap-3">
      <!-- 页面标题 -->
      <p class="text-xl font-bold text-gray-900 mb-4">CC-3 主导航-我的 (状态 I：未签到态)</p>

      <!-- 手机画板 -->
      <div class="w-[375px] bg-white shadow-2xl border border-gray-200 relative overflow-hidden rounded-none" style="min-height: 720px; display: flex; flex-direction: column;">

        <!-- Navbar -->
        <div class="h-16 flex items-center justify-between px-4 border-b border-gray-100">
          <div class="w-8"></div>
          <span class="text-xl font-bold text-gray-900">我的</span>
          <i class="ri-settings-3-line text-xl text-gray-900"></i>
        </div>

        <!-- 用户信息区 -->
        <div class="px-6 py-5 flex items-center gap-4 border-b border-gray-100">
          <!-- 头像 -->
          <div class="w-16 h-16 rounded-full bg-gray-100 flex items-center justify-center flex-shrink-0">
            <i class="ri-user-3-line text-2xl text-gray-400"></i>
          </div>
          <!-- 信息区 -->
          <div class="flex flex-col gap-1">
            <span class="text-xl font-bold text-gray-900">张大妈</span>
            <span class="text-base text-gray-400">东方老年大学</span>
          </div>
        </div>

        <!-- 积分卡片 -->
        <div class="mx-4 mt-5 p-4 rounded-2xl border border-gray-900">
          <!-- 标题行 -->
          <div class="flex justify-between items-center mb-3">
            <span class="text-lg font-normal text-gray-700">我的积分</span>
            <i class="ri-arrow-right-s-line text-xl text-gray-400"></i>
          </div>
          <!-- 余额行 -->
          <div class="flex items-baseline gap-1 mb-4">
            <span class="text-4xl font-bold text-gray-900">128</span>
            <span class="text-base text-gray-400">积分</span>
          </div>
          <!-- 签到按钮 -->
          <button class="h-10 bg-gray-900 text-white font-medium rounded-xl w-full text-base flex items-center justify-center">
            今日签到 +3 积分
          </button>
        </div>

        <!-- 功能菜单 -->
        <div class="mx-4 mt-5 rounded-2xl border border-gray-100 overflow-hidden divide-y divide-gray-100">
          <!-- 行1：我的社团 -->
          <div class="flex items-center justify-between px-4 h-14">
            <div class="flex items-center">
              <i class="ri-team-line text-xl text-gray-700 mr-3"></i>
              <span class="text-lg font-normal text-gray-700">我的社团</span>
            </div>
            <i class="ri-arrow-right-s-line text-xl text-gray-400"></i>
          </div>
          <!-- 行2：我的作品 -->
          <div class="flex items-center justify-between px-4 h-14">
            <div class="flex items-center">
              <i class="ri-image-line text-xl text-gray-700 mr-3"></i>
              <span class="text-lg font-normal text-gray-700">我的作品</span>
            </div>
            <i class="ri-arrow-right-s-line text-xl text-gray-400"></i>
          </div>
          <!-- 行3：我的申请 -->
          <div class="flex items-center justify-between px-4 h-14">
            <div class="flex items-center">
              <i class="ri-file-list-3-line text-xl text-gray-700 mr-3"></i>
              <span class="text-lg font-normal text-gray-700">我的申请</span>
            </div>
            <i class="ri-arrow-right-s-line text-xl text-gray-400"></i>
          </div>
        </div>

        <!-- Spacer -->
        <div class="flex-1"></div>

        <!-- 底部 Tabbar -->
        <div class="h-20 flex items-center justify-around border-t border-gray-200 bg-white mt-auto">
          <!-- 社团 -->
          <div class="flex flex-col items-center gap-1">
            <i class="ri-home-5-line text-xl text-gray-400"></i>
            <span class="text-base text-gray-400">社团</span>
          </div>
          <!-- 赛事 -->
          <div class="flex flex-col items-center gap-1">
            <i class="ri-trophy-line text-xl text-gray-400"></i>
            <span class="text-base text-gray-400">赛事</span>
          </div>
          <!-- 我的（活跃态） -->
          <div class="flex flex-col items-center gap-1">
            <i class="ri-user-3-line text-xl text-gray-900"></i>
            <span class="text-base font-bold text-gray-900">我的</span>
          </div>
        </div>

      </div>
    </div>

    <!-- 组件变体集（右栏） -->
    <div class="flex flex-col gap-10 w-[360px]">

      <!-- 区域标题 -->
      <p class="text-xl font-bold text-gray-900">多状态展示</p>

      <!-- 变体卡片 1：积分卡片 - 已签到态 -->
      <div class="bg-white p-6 border border-gray-200 shadow-md rounded-none">
        <p class="text-lg font-bold text-gray-700 mb-4 pl-3 border-l-4 border-gray-900">积分卡片：已签到态</p>
        <div class="p-4 rounded-2xl border border-gray-200">
          <!-- 标题行 -->
          <div class="flex justify-between items-center mb-3">
            <span class="text-lg font-normal text-gray-700">我的积分</span>
            <i class="ri-arrow-right-s-line text-xl text-gray-400"></i>
          </div>
          <!-- 余额行 -->
          <div class="flex items-baseline gap-1 mb-4">
            <span class="text-4xl font-bold text-gray-900">128</span>
            <span class="text-base text-gray-400">积分</span>
          </div>
          <!-- 签到按钮（已签到 Disabled 态） -->
          <button class="h-10 bg-white border border-gray-200 text-gray-400 rounded-xl w-full text-base flex items-center justify-center" disabled>
            今日已签到 ✓
          </button>
        </div>
      </div>

      <!-- 变体卡片 2：积分卡片 - 零余额态 -->
      <div class="bg-white p-6 border border-gray-200 shadow-md rounded-none">
        <p class="text-lg font-bold text-gray-700 mb-4 pl-3 border-l-4 border-gray-900">积分卡片：零余额态</p>
        <div class="p-4 rounded-2xl border border-gray-200">
          <!-- 标题行 -->
          <div class="flex justify-between items-center mb-3">
            <span class="text-lg font-normal text-gray-700">我的积分</span>
            <i class="ri-arrow-right-s-line text-xl text-gray-400"></i>
          </div>
          <!-- 余额行 -->
          <div class="flex items-baseline gap-1 mb-4">
            <span class="text-4xl font-bold text-gray-900">0</span>
            <span class="text-base text-gray-400">积分</span>
          </div>
          <!-- 签到按钮（Primary） -->
          <button class="h-10 bg-gray-900 text-white font-medium rounded-xl w-full text-base flex items-center justify-center">
            今日签到 +3 积分
          </button>
        </div>
      </div>

    </div>
    <!-- /组件变体集 -->

  </div>
  <!-- /Artboard -->

</body>
</html>
